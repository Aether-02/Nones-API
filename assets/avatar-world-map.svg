<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-label="Atlas-style Avatar world map">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#2d698f"/>
      <stop offset="1" stop-color="#173447"/>
    </linearGradient>
    <radialGradient id="coastGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ebddb8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ebddb8" stop-opacity="0"/>
    </radialGradient>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
    <filter id="landShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f1f28" flood-opacity="0.38"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#091722" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1800" height="1100" fill="url(#ocean)"/>
  <rect width="1800" height="1100" fill="url(#coastGlow)"/>
  <g filter="url(#landShadow)">
    <path d="M80 890 C210 770 430 700 620 760 C700 800 728 910 600 995 C410 1045 220 1025 110 940 Z" fill="#dfe4cf"/>
    <path d="M1170 175 C1320 38 1640 48 1740 240 C1765 310 1730 418 1605 474 C1490 514 1330 452 1234 390 C1175 348 1148 255 1170 175Z" fill="#bc8a6a"/>
    <path d="M610 300 C820 176 1090 206 1228 388 C1308 495 1290 642 1200 740 C1095 860 930 894 768 820 C588 742 502 570 546 420 C560 372 585 336 610 300 Z" fill="#9bb184"/>
    <path d="M165 170 C298 52 470 44 625 177 C620 286 522 365 396 376 C290 387 172 320 144 245 C137 217 145 189 165 170 Z" fill="#d5dfeb"/>
  </g>
  <g fill="none" stroke="#7f6a43" stroke-opacity="0.42" stroke-width="3">
    <path d="M650 390 C790 350 950 350 1100 430"/>
    <path d="M700 520 C850 500 1010 520 1130 610"/>
    <path d="M280 890 C380 835 480 832 560 882"/>
    <path d="M1265 250 C1380 180 1540 180 1660 245"/>
  </g>
  <g fill="none" stroke="#eee2bf" stroke-opacity="0.35" stroke-width="2">
    <path d="M600 772 C740 672 948 662 1120 740"/>
    <path d="M650 280 C820 198 1010 208 1170 320"/>
  </g>
  <rect width="1800" height="1100" filter="url(#paperNoise)"/>
  <circle cx="1380" cy="260" r="11" fill="#8f2b1b"/>
  <circle cx="420" cy="220" r="11" fill="#66859d"/>
  <circle cx="930" cy="520" r="11" fill="#487238"/>
  <circle cx="320" cy="820" r="11" fill="#285a86"/>
  <text x="1410" y="251" font-size="36" fill="#f4ecd9" font-family="Georgia, serif" filter="url(#shadow)">Fire Nation</text>
  <text x="454" y="215" font-size="36" fill="#f4ecd9" font-family="Georgia, serif" filter="url(#shadow)">Air Temples</text>
  <text x="960" y="515" font-size="36" fill="#f4ecd9" font-family="Georgia, serif" filter="url(#shadow)">Earth Kingdom</text>
  <text x="350" y="815" font-size="36" fill="#f4ecd9" font-family="Georgia, serif" filter="url(#shadow)">Water Tribe</text>
</svg>
