<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planetary API Observatory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      :root {
        --bg-dark: #031126;
        --bg-deep: #07193f;
        --line: rgba(103, 171, 255, 0.3);
        --panel-bg: rgba(9, 26, 58, 0.62);
        --text-main: #ecf5ff;
        --text-soft: #a8c5e6;
        --accent: #3ec4ff;
        --accent-strong: #26a7ff;
        --radius-card: 16px;
      }

      :root[data-theme="light"] {
        --bg-dark: #f7fbff;
        --bg-deep: #eaf3ff;
        --line: rgba(38, 130, 255, 0.22);
        --panel-bg: rgba(255, 255, 255, 0.62);
        --text-main: #071b33;
        --text-soft: #244a73;
        --accent: #0077ff;
        --accent-strong: #0057c7;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text-main);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 12% 8%, rgba(126, 198, 255, 0.3), transparent 40%),
          radial-gradient(circle at 90% 24%, rgba(39, 122, 255, 0.22), transparent 35%),
          radial-gradient(circle at 72% 62%, rgba(10, 74, 168, 0.28), transparent 55%),
          linear-gradient(180deg, #051327 0%, #061836 42%, #081d45 100%);
        background-attachment: fixed;
      }

      :root[data-theme="light"] body {
        background:
          radial-gradient(circle at 12% 8%, rgba(0, 140, 255, 0.18), transparent 40%),
          radial-gradient(circle at 90% 24%, rgba(0, 87, 199, 0.12), transparent 35%),
          radial-gradient(circle at 72% 62%, rgba(0, 110, 255, 0.14), transparent 55%),
          linear-gradient(180deg, #f7fbff 0%, #ecf4ff 42%, #e6f0ff 100%);
        background-attachment: scroll;
      }

      .app-shell {
        max-width: 1200px;
        padding-inline: clamp(0.4rem, 2vw, 1rem);
      }

      #searchForm .col-md-2 {
        align-items: stretch;
      }

      .hero {
        border-radius: 28px;
        border: 1px solid var(--line);
        background:
          linear-gradient(92deg, rgba(6, 20, 45, 0.86) 0%, rgba(7, 27, 61, 0.56) 48%, rgba(8, 40, 86, 0.25) 100%),
          radial-gradient(circle at 75% 50%, rgba(53, 178, 255, 0.22), transparent 48%);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
        position: relative;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 12% 22%, rgba(255, 255, 255, 0.7) 1px, transparent 2px),
          radial-gradient(circle at 30% 66%, rgba(151, 214, 255, 0.6) 1px, transparent 2px),
          radial-gradient(circle at 48% 24%, rgba(255, 255, 255, 0.7) 1px, transparent 2px),
          radial-gradient(circle at 60% 76%, rgba(177, 220, 255, 0.55) 1px, transparent 2px),
          radial-gradient(circle at 82% 30%, rgba(255, 255, 255, 0.65) 1px, transparent 2px),
          radial-gradient(circle at 90% 68%, rgba(141, 211, 255, 0.6) 1px, transparent 2px);
        background-size: 280px 220px;
        opacity: 0.35;
        pointer-events: none;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 74% 46%, rgba(93, 213, 255, 0.24), transparent 36%);
        pointer-events: none;
      }

      .hero-title {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.15;
        max-width: 13ch;
        margin-bottom: 1rem;
      }

      .hero-copy {
        color: var(--text-soft);
        max-width: 62ch;
      }

      .ring-planet {
        width: min(38vw, 420px);
        aspect-ratio: 1;
        border-radius: 50%;
        position: absolute;
        right: -80px;
        top: 55px;
        background:
          radial-gradient(circle at 38% 32%, #c9f2ff 0%, #73c8f4 26%, #3175be 58%, #143f7b 100%);
        border: 1px solid rgba(170, 222, 255, 0.45);
        box-shadow: 0 0 40px rgba(53, 145, 252, 0.3), inset -24px -18px 40px rgba(5, 14, 36, 0.5);
      }

      .ring-planet .planet-shade {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 26% 30%, rgba(231, 251, 255, 0.35), transparent 45%),
          linear-gradient(110deg, transparent 20%, rgba(12, 45, 97, 0.45) 76%);
      }

      .ring-planet::before,
      .ring-planet::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%) rotate(-16deg);
        border-radius: 50%;
      }

      .ring-planet::before {
        width: 148%;
        height: 40%;
        border: 2px solid rgba(97, 218, 255, 0.65);
        box-shadow: 0 0 26px rgba(56, 186, 255, 0.5);
      }

      .ring-planet::after {
        width: 128%;
        height: 28%;
        border: 1px solid rgba(171, 236, 255, 0.4);
      }

      .form-label {
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .form-control,
      .form-select {
        background: rgba(4, 21, 46, 0.72);
        border: 1px solid rgba(97, 165, 236, 0.34);
        color: var(--text-main);
        border-radius: 12px;
      }

      .form-control::placeholder {
        color: rgba(200, 222, 248, 0.6);
      }

      .form-control:focus,
      .form-select:focus {
        background: rgba(4, 21, 46, 0.92);
        border-color: rgba(89, 200, 255, 0.9);
        box-shadow: 0 0 0 0.24rem rgba(56, 192, 255, 0.2);
        color: var(--text-main);
      }

      .search-btn {
        border: 1px solid rgba(98, 201, 255, 0.62);
        color: #ffffff;
        background: linear-gradient(120deg, #1a6dca, #1eb0ff);
        border-radius: 12px;
      }

      .search-btn:hover {
        background: linear-gradient(120deg, #1f7ae2, #3ac1ff);
      }

      .planet-card {
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        background:
          linear-gradient(160deg, rgba(8, 32, 69, 0.82), rgba(5, 22, 50, 0.86)),
          radial-gradient(circle at 30% 16%, rgba(95, 214, 255, 0.18), transparent 50%);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        transition: transform 0.32s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.28s ease;
        cursor: pointer;
        transform-style: preserve-3d;
        position: relative;
      }

      .planet-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(130deg, rgba(154, 221, 255, 0.14), rgba(154, 221, 255, 0) 38%, rgba(116, 151, 255, 0.1) 72%, rgba(154, 221, 255, 0.18));
        opacity: 0.85;
      }

      .planet-card:hover {
        transform: perspective(980px) rotateX(6deg) rotateY(-6deg) translateY(-9px);
        border-color: rgba(96, 194, 255, 0.7);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.46), 0 0 0 1px rgba(103, 196, 255, 0.32), 0 0 32px rgba(65, 160, 255, 0.28);
      }

      .planet-card.is-activating {
        animation: cardClickIn 620ms cubic-bezier(0.17, 0.79, 0.25, 1.22);
      }

      @keyframes cardClickIn {
        0% { transform: scale(1) rotate(0deg); }
        45% { transform: scale(1.08) rotate(-3deg); }
        100% { transform: scale(1.01) rotate(0deg); }
      }

      .planet-art {
        height: 225px;
        width: 100%;
        border-bottom: 1px solid rgba(98, 165, 228, 0.26);
        position: relative;
        display: grid;
        place-items: center;
        perspective: 700px;
        overflow: hidden;
      }

      .planet-art::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18), transparent 48%),
          radial-gradient(circle at 50% 80%, rgba(0, 0, 0, 0.28), transparent 50%);
      }

      .planet-sphere {
        width: 118px;
        height: 118px;
        border-radius: 50%;
        position: relative;
        z-index: 2;
        overflow: hidden;
        --tilt-y: -18deg;
        box-shadow:
          inset -28px -22px 34px rgba(3, 12, 30, 0.64),
          inset 18px 12px 28px rgba(255, 255, 255, 0.22),
          0 12px 22px rgba(0, 0, 0, 0.45);
        transform: translateZ(26px) rotateY(var(--tilt-y));
      }

      .planet-sphere::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.15) 24%, transparent 44%),
          radial-gradient(circle at 70% 70%, transparent 40%, rgba(0, 0, 0, 0.42) 100%);
        pointer-events: none;
        z-index: 3;
      }

      .planet-sphere::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(145, 215, 255, 0.18);
        pointer-events: none;
        z-index: 4;
      }

      .planet-texture {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background-size: 240% 100%;
        background-position: 0% 50%;
        background-repeat: repeat-x;
        filter: saturate(1.15) contrast(1.08);
        transform: scale(1.12);
        z-index: 1;
      }

      .planet-texture::before {
        content: "";
        position: absolute;
        inset: -8% -12%;
        border-radius: 50%;
        background: inherit;
        opacity: 0.38;
        mix-blend-mode: soft-light;
        transform: scaleX(0.78) translateX(-7%);
      }

      .planet-bands {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        z-index: 2;
        background:
          conic-gradient(from 25deg at 52% 50%, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04) 16%, rgba(0, 0, 0, 0.16) 35%, rgba(255, 255, 255, 0.06) 52%, rgba(0, 0, 0, 0.2) 72%, rgba(255, 255, 255, 0.12) 100%),
          repeating-linear-gradient(165deg, rgba(255, 255, 255, 0.12) 0 7px, rgba(0, 0, 0, 0.08) 7px 14px);
        opacity: 0.26;
        transform: rotate(-12deg) scale(1.02);
      }

      .planet-terminator {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 26% 22%, rgba(255, 255, 255, 0.24), transparent 34%),
          linear-gradient(110deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 32%, rgba(2, 8, 22, 0.62) 74%, rgba(0, 0, 0, 0.8) 100%);
        mix-blend-mode: multiply;
        z-index: 3;
      }

      .planet-atmosphere {
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        z-index: 4;
        background: radial-gradient(circle at 34% 30%, rgba(176, 228, 255, 0.4), transparent 44%);
        box-shadow:
          inset 0 0 20px rgba(124, 206, 255, 0.24),
          0 0 18px rgba(101, 191, 255, 0.24);
        pointer-events: none;
      }

      .planet-name {
        color: #ffffff;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .planet-card-body {
        padding: 1rem 1rem 1.06rem;
      }

      .planet-desc {
        margin: 0.5rem 0 0.8rem;
        color: #c4dbf6;
        font-size: 0.84rem;
        line-height: 1.45;
        min-height: 2.4em;
      }

      .planet-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .planet-metric {
        border: 1px solid rgba(117, 189, 255, 0.28);
        background: rgba(9, 37, 76, 0.45);
        border-radius: 10px;
        padding: 0.48rem 0.5rem;
      }

      .planet-metric .k {
        display: block;
        color: #9ec7ee;
        font-size: 0.66rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .planet-metric .v {
        display: block;
        margin-top: 0.2rem;
        color: #f0f7ff;
        font-size: 0.78rem;
      }

      .tag {
        border: 1px solid rgba(101, 178, 255, 0.5);
        color: #cce9ff;
        background: rgba(16, 70, 121, 0.45);
        border-radius: 999px;
      }

      .info-text {
        color: #d3e4f8;
        overflow-wrap: anywhere;
      }

      .status-box {
        border: 1px solid rgba(95, 167, 238, 0.5);
        color: var(--text-main);
        border-radius: var(--radius-card);
        background: rgba(5, 23, 54, 0.7);
      }

      .details-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 9, 22, 0.65);
        backdrop-filter: blur(6px);
        padding: clamp(0.6rem, 2vh, 1rem);
        z-index: 50;
      }

      .details-overlay.d-none {
        display: none;
      }

      .details-panel {
        width: min(760px, calc(100vw - 1.2rem));
        max-height: calc(100vh - 1.2rem);
        border: 1px solid rgba(106, 188, 255, 0.48);
        border-radius: 22px;
        background:
          linear-gradient(150deg, rgba(6, 21, 46, 0.95), rgba(5, 19, 44, 0.94)),
          radial-gradient(circle at 100% 0%, rgba(53, 167, 255, 0.24), transparent 48%);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        animation: detailsAppear 320ms ease-out;
        overflow: hidden;
      }

      #detailBody {
        max-height: calc(100vh - 160px);
        overflow: auto;
      }

      @keyframes detailsAppear {
        0% { opacity: 0; transform: translateY(14px) scale(0.96); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      .details-header {
        border-bottom: 1px solid rgba(115, 193, 255, 0.24);
        position: relative;
        z-index: 4;
      }

      .close-btn {
        border: 1px solid rgba(101, 177, 255, 0.55);
        color: #d5ecff;
        background: rgba(17, 67, 118, 0.55);
        border-radius: 10px;
      }

      .close-btn:hover {
        background: rgba(31, 96, 162, 0.66);
      }

      .detail-cinematic {
        position: relative;
        min-height: clamp(380px, 48vh, 540px);
        border-radius: 14px;
        overflow: hidden;
        isolation: isolate;
        --mx: 0px;
        --my: 0px;
        --planet-core: radial-gradient(circle at 30% 30%, #d9f7ff 0%, #8ad8ff 42%, #2f75be 70%, #163f79 100%);
        --planet-atmos-color: rgba(122, 203, 255, 0.32);
        --nebula-a: rgba(146, 98, 255, 0.35);
        --nebula-b: rgba(73, 170, 255, 0.3);
        --nebula-c: rgba(41, 118, 255, 0.24);
        --planet-ring-opacity: 0;
      }

      .detail-space-layer {
        position: absolute;
        inset: -6%;
        pointer-events: none;
      }

      .detail-space-base {
        background:
          radial-gradient(circle at 18% 24%, var(--nebula-a), transparent 32%),
          radial-gradient(circle at 82% 22%, var(--nebula-b), transparent 35%),
          radial-gradient(circle at 60% 82%, var(--nebula-c), transparent 38%),
          linear-gradient(180deg, rgba(3, 14, 36, 0.92), rgba(2, 9, 26, 0.9));
        transform: translate(calc(var(--mx) * -0.08), calc(var(--my) * -0.08));
      }

      .detail-nebula {
        background:
          radial-gradient(circle at 65% 40%, rgba(107, 204, 255, 0.26), transparent 36%),
          radial-gradient(circle at 34% 72%, rgba(106, 95, 255, 0.22), transparent 30%),
          radial-gradient(circle at 80% 70%, rgba(255, 121, 238, 0.12), transparent 33%);
        filter: blur(2px);
        mix-blend-mode: screen;
        transform: translate(calc(var(--mx) * -0.16), calc(var(--my) * -0.16));
      }

      .detail-stars {
        background-image:
          radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.86) 1px, transparent 2px),
          radial-gradient(circle at 20% 70%, rgba(209, 237, 255, 0.75) 1px, transparent 2px),
          radial-gradient(circle at 38% 34%, rgba(255, 255, 255, 0.85) 1px, transparent 2px),
          radial-gradient(circle at 46% 78%, rgba(177, 225, 255, 0.66) 1px, transparent 2px),
          radial-gradient(circle at 62% 18%, rgba(255, 255, 255, 0.82) 1px, transparent 2px),
          radial-gradient(circle at 74% 60%, rgba(228, 245, 255, 0.72) 1px, transparent 2px),
          radial-gradient(circle at 88% 30%, rgba(255, 255, 255, 0.8) 1px, transparent 2px);
        background-size: 280px 280px;
        opacity: 0.7;
        animation: driftStars 32s linear infinite;
        transform: translate(calc(var(--mx) * -0.2), calc(var(--my) * -0.2));
      }

      .detail-glow {
        background: radial-gradient(circle at 64% 42%, rgba(88, 207, 255, 0.36), transparent 28%);
        filter: blur(16px);
      }

      .detail-planet-wrap {
        position: absolute;
        right: clamp(18px, 4vw, 46px);
        top: clamp(22px, 4vh, 58px);
        width: clamp(120px, 17vw, 170px);
        aspect-ratio: 1;
        transform: translate(calc(var(--mx) * 0.25), calc(var(--my) * 0.25));
        pointer-events: none;
        z-index: 2;
      }

      .detail-planet {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        position: relative;
        overflow: hidden;
        box-shadow:
          inset -34px -28px 48px rgba(1, 8, 28, 0.66),
          inset 24px 14px 34px rgba(255, 255, 255, 0.24),
          0 16px 44px rgba(0, 0, 0, 0.6),
          0 0 24px rgba(98, 194, 255, 0.33);
        transform: rotateZ(-9deg);
        animation: floatPlanet 7.5s ease-in-out infinite;
      }

      .detail-planet::before {
        content: "";
        position: absolute;
        inset: 20% -12%;
        border-radius: 50%;
        border: 2px solid rgba(202, 235, 255, 0.48);
        box-shadow: 0 0 20px rgba(135, 198, 255, 0.34);
        opacity: var(--planet-ring-opacity);
        transform: rotate(-14deg);
      }

      .detail-planet-surface {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background-size: 170% 100%;
        background-repeat: repeat-x;
        background-position: center;
        filter: saturate(1.14) contrast(1.12);
        animation: rotatePlanetSurface 28s linear infinite;
      }

      .detail-planet-surface.is-photo {
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        animation: none;
        filter: saturate(1.08) contrast(1.05);
      }

      .detail-planet-shade {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.58), transparent 35%),
          linear-gradient(118deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0) 42%, rgba(2, 7, 20, 0.36) 76%, rgba(0, 0, 0, 0.52) 100%);
      }

      .detail-planet-atmos {
        position: absolute;
        inset: -1px;
        border-radius: 50%;
        box-shadow: inset 0 0 20px var(--planet-atmos-color), 0 0 24px var(--planet-atmos-color);
      }

      .detail-content-glass {
        position: relative;
        z-index: 3;
        width: min(520px, 62%);
        max-width: 100%;
        margin-top: clamp(22px, 4vh, 40px);
        margin-left: clamp(8px, 1.2vw, 16px);
        border: 1px solid rgba(135, 208, 255, 0.34);
        border-radius: 16px;
        background: linear-gradient(160deg, rgba(6, 20, 48, 0.7), rgba(4, 18, 44, 0.56));
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.32);
      }

      .detail-content-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.8rem;
      }

      .detail-stat {
        border: 1px solid rgba(120, 186, 255, 0.3);
        border-radius: 12px;
        background: rgba(7, 34, 74, 0.52);
        padding: 0.72rem 0.78rem;
      }

      .detail-stat .k {
        display: block;
        font-size: 0.76rem;
        letter-spacing: 0.04em;
        color: #b5d9ff;
      }

      .detail-stat .v {
        display: block;
        font-size: 0.94rem;
        margin-top: 0.24rem;
        color: #eef6ff;
        overflow-wrap: anywhere;
      }

      @keyframes rotatePlanetSurface {
        from { background-position-x: 0%; }
        to { background-position-x: 200%; }
      }

      @keyframes driftStars {
        from { transform: translate(0, 0); }
        to { transform: translate(-28px, -22px); }
      }

      @keyframes floatPlanet {
        0%, 100% { transform: rotateZ(-9deg) translateY(0); }
        50% { transform: rotateZ(-6deg) translateY(-8px); }
      }

      @media (max-width: 1200px) {
        .details-panel {
          width: min(700px, calc(100vw - 1rem));
        }

        .detail-content-glass {
          width: min(560px, 68%);
        }
      }

      @media (max-width: 992px) {
        .hero {
          border-radius: 22px;
        }

        #results {
          row-gap: 1rem;
        }

        .planet-card:hover {
          transform: translateY(-4px);
        }

        .ring-planet {
          opacity: 0.32;
          right: -130px;
          top: 120px;
        }

        .details-panel {
          width: min(640px, calc(100vw - 0.9rem));
        }

        #detailBody {
          max-height: calc(100vh - 140px);
        }
      }

      @media (max-width: 768px) {
        body {
          background-attachment: scroll;
        }

        .app-shell {
          padding-inline: 0.35rem;
        }

        .hero {
          border-radius: 18px;
          padding: 1rem !important;
        }

        .hero-title {
          max-width: none;
          font-size: clamp(1.5rem, 7vw, 2rem);
          margin-bottom: 0.7rem;
        }

        .hero-copy {
          font-size: 0.92rem;
          margin-bottom: 0.9rem !important;
        }

        .form-label {
          font-size: 0.82rem;
        }

        .search-btn {
          min-height: 42px;
        }

        #searchForm {
          row-gap: 0.65rem;
        }

        .ring-planet {

      const searchForm = document.getElementById("searchForm");
      const nameQueryInput = document.getElementById("nameQuery");
      const bodyFilterInput = document.getElementById("bodyFilter");
      const searchButton = searchForm.querySelector("button[type='submit']");
      const resultsEl = document.getElementById("results");

      const closeDetailsBtn = document.getElementById("closeDetailsBtn");
      const imageCache = new Map();
      let detailParallaxCleanup = null;

      const THEME_STORAGE_KEY = "theme_preference";

      function applyTheme(theme) {
        const normalized = theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = normalized;
        try {
          window.localStorage.setItem(THEME_STORAGE_KEY, normalized);
        } catch {
          // ignore storage errors
        }

        const btn = document.getElementById("themeToggleBtn");
        if (btn) btn.textContent = normalized === "dark" ? "Light mode" : "Dark mode";
      }

      function initTheme() {
        let saved = null;
        try {
          saved = window.localStorage.getItem(THEME_STORAGE_KEY);
        } catch {
          // ignore
        }

        if (saved === "light" || saved === "dark") {
          applyTheme(saved);
          return;
        }

        const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        applyTheme(prefersLight ? "light" : "dark");
      }

      function toggleTheme() {
        const current = document.documentElement.dataset.theme === "light" ? "light" : "dark";
        applyTheme(current === "light" ? "dark" : "light");
      }

      initTheme();
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      if (themeToggleBtn) themeToggleBtn.addEventListener("click", toggleTheme);

      const KNOWN_PLANET_IMAGE_MAP = {

        venus: { cardGradient: "radial-gradient(circle at 34% 28%, #fde8c4 0%, #e5bd74 42%, #b87e36 72%, #6a4728 100%)", atmos: "rgba(255, 203, 130, 0.28)", nebula: ["rgba(204, 127, 71, 0.24)", "rgba(194, 96, 54, 0.2)", "rgba(117, 69, 46, 0.2)"], ring: 0 },
        earth: { cardGradient: "radial-gradient(circle at 32% 29%, #e9fbff 0%, #88d8ff 36%, #2f76be 66%, #143d79 100%)", atmos: "rgba(129, 214, 255, 0.34)", nebula: ["rgba(76, 131, 255, 0.27)", "rgba(68, 192, 255, 0.22)", "rgba(81, 94, 255, 0.2)"], ring: 0 },
        mars: { cardGradient: "radial-gradient(circle at 30% 30%, #ffd0ad 0%, #d88a5f 40%, #a14f35 72%, #5a2f24 100%)", atmos: "rgba(255, 168, 121, 0.25)", nebula: ["rgba(207, 101, 61, 0.28)", "rgba(167, 66, 45, 0.22)", "rgba(92, 41, 38, 0.2)"], ring: 0 },

        statusEl.classList.remove("d-none");

      }

        statusEl.classList.add("d-none");
        statusEl.textContent = "";

      function setLoadingState(isLoading) {
        if (!searchButton) return;
        searchButton.disabled = isLoading;
        searchButton.textContent = isLoading ? "Searching..." : "Search";
      }

      function formatNumber(value, digits = 2) {
        if (typeof value !== "number" || Number.isNaN(value)) return "Unknown";
        return value.toLocaleString(undefined, { maximumFractionDigits: digits });
      }

      function formatMass(mass) {
        if (!mass || typeof mass.massValue !== "number" || typeof mass.massExponent !== "number") {
          return "Unknown";
        }
        return `${mass.massValue}e${mass.massExponent} kg`;
      }

      function renderDetailLine(label, value) {
        return `
          <article class="detail-stat">
            <span class="k">${label}</span>
            <span class="v">${value}</span>
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function attachDetailParallax() {
        if (detailParallaxCleanup) detailParallaxCleanup();
        const root = detailBodyEl.querySelector(".detail-cinematic");
        if (!root) return;

        const handleMove = (event) => {
          const rect = root.getBoundingClientRect();
          const x = ((event.clientX - rect.left) / rect.width) - 0.5;
          const y = ((event.clientY - rect.top) / rect.height) - 0.5;
          root.style.setProperty("--mx", `${x * 18}px`);
          root.style.setProperty("--my", `${y * 18}px`);
        };

        const handleLeave = () => {
          root.style.setProperty("--mx", "0px");
          root.style.setProperty("--my", "0px");
        };

        root.addEventListener("pointermove", handleMove, { passive: true });
        root.addEventListener("pointerleave", handleLeave, { passive: true });
        detailParallaxCleanup = () => {
          root.removeEventListener("pointermove", handleMove);
          root.removeEventListener("pointerleave", handleLeave);
          detailParallaxCleanup = null;
        };
      }

          ["Discovered By", body.discoveredBy || "Not listed"],
          ["Discovery Date", body.discoveryDate || "Unknown"]

        const planetName = body.englishName || body.name || "planet";

                <div class="detail-planet-atmos"></div>
              </div>
            </div>
            <article class="detail-content-glass p-3 p-md-4">
              <div class="detail-content-grid">
                ${values.map(([label, value]) => renderDetailLine(escapeHtml(label), escapeHtml(value))).join("")}
              </div>
            </article>
          </section>
        `;
        attachDetailParallax();
        detailsOverlay.classList.remove("d-none");
      }

      function closeDetails() {
        if (detailParallaxCleanup) detailParallaxCleanup();
        detailsOverlay.classList.add("d-none");
      }

      function getPlanetVisualProfile(name) {
        const key = String(name || "").toLowerCase().trim();
        if (PLANET_VISUALS[key]) return PLANET_VISUALS[key];
        for (const known of Object.keys(PLANET_VISUALS)) {
          if (key.includes(known)) return PLANET_VISUALS[known];
        }

        return {
          cardGradient: makeGradient(name),
          atmos: "rgba(122, 203, 255, 0.28)",
          nebula: ["rgba(121, 111, 248, 0.28)", "rgba(76, 162, 255, 0.24)", "rgba(67, 109, 222, 0.18)"],
          ring: 0
        };
      }

      function buildDetailThemeVars(profile) {
        return [
          `--planet-core:${profile.cardGradient}`,
          `--planet-atmos-color:${profile.atmos}`,
          `--nebula-a:${profile.nebula[0]}`,
          `--nebula-b:${profile.nebula[1]}`,
          `--nebula-c:${profile.nebula[2]}`,
          `--planet-ring-opacity:${profile.ring ? "0.85" : "0"}`
        ].join(";");
      }

      function normalizePlanetName(value) {
        return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      }

      function resolveKnownPlanetImage(planetName) {
        const normalized = normalizePlanetName(planetName);
        for (const [key, url] of Object.entries(KNOWN_PLANET_IMAGE_MAP)) {
          if (normalized === key || normalized.includes(key)) return url;
        }
        return null;
      }

      function cssBackgroundImageValue(value) {
        if (!value) return "";
        if (value.startsWith("http://") || value.startsWith("https://")) {
          return `url("${value.replaceAll("\"", "%22")}")`;
        }
        return value;
      }

      function isPhotoUrl(value) {
        return typeof value === "string" && (value.startsWith("http://") || value.startsWith("https://"));
      }

      function normalizeExoplanet(rawPlanet) {
        const earthMass = typeof rawPlanet.pl_bmasse === "number" ? rawPlanet.pl_bmasse : null;
        const earthRadius = typeof rawPlanet.pl_rade === "number" ? rawPlanet.pl_rade : null;
        const massKg = earthMass !== null ? earthMass * 5.9722e24 : null;
        const meanRadiusKm = earthRadius !== null ? earthRadius * 6371 : null;

        return {
          englishName: rawPlanet.pl_name || "Unknown body",
          bodyType: "Planet",
          imageUrl: null,
          gravity: null,
          meanRadius: meanRadiusKm,
          mass: massKg !== null ? { massValue: massKg / 1e24, massExponent: 24 } : null,
          density: null,
          escape: null,
          avgTemp: typeof rawPlanet.pl_eqt === "number" ? rawPlanet.pl_eqt : null,
          sideralRotation: null,
          sideralOrbit: typeof rawPlanet.pl_orbper === "number" ? rawPlanet.pl_orbper : null,
          moons: [],
          aroundPlanet: rawPlanet.hostname ? { planet: rawPlanet.hostname } : null,
          discoveredBy: rawPlanet.discoverymethod || "Not listed",
          discoveryDate: rawPlanet.disc_year ? String(rawPlanet.disc_year) : "Unknown"
        };
      }

      async function fetchPlanetImageUrl(planetName) {
        if (!planetName) return null;
        if (imageCache.has(planetName)) return imageCache.get(planetName);

        const knownImage = resolveKnownPlanetImage(planetName);
        if (knownImage) {
          imageCache.set(planetName, knownImage);
          return knownImage;
        }

        try {
          const response = await fetch(`${WIKIPEDIA_SUMMARY_API}${encodeURIComponent(planetName)}`);
          if (!response.ok) {
            imageCache.set(planetName, null);
            return null;
          }

          const payload = await response.json();
          const imageUrl = payload && payload.thumbnail && payload.thumbnail.source ? payload.thumbnail.source : null;
          imageCache.set(planetName, imageUrl);
          return imageUrl;
        } catch {
          imageCache.set(planetName, null);
          return null;
        }
      }

      async function hydratePlanetImages(bodies) {
        const items = bodies.slice(0, IMAGE_FETCH_LIMIT);
        await Promise.all(items.map(async (body, index) => {
          const name = body.englishName || body.name || "";
          const imageUrl = body.imageUrl || resolveKnownPlanetImage(name) || await fetchPlanetImageUrl(name);
          if (!imageUrl) return;
          body.imageUrl = imageUrl;

          const target = resultsEl.querySelector(`[data-texture-index="${index}"]`);
          if (!target) return;
          target.style.backgroundImage = `url('${imageUrl.replace(/'/g, "%27")}')`;
          target.style.backgroundSize = "auto 100%";
        }));
      }

      function makeGradient(seed = "") {
        const key = (seed || "planet").toLowerCase();
        const variants = [
          "radial-gradient(circle at 30% 30%, #d3f4ff, #62c1f7 48%, #255cbb)",
          "radial-gradient(circle at 30% 30%, #f8e2ca, #d7ac88 52%, #634b8e)",
          "radial-gradient(circle at 30% 30%, #e5f8ff, #95d6ff 48%, #2f75c2)",
          "radial-gradient(circle at 30% 30%, #d3ebff, #89b5ef 50%, #35549d)"
        ];
        const index = key.split("").reduce((sum, char) => sum + char.charCodeAt(0), 0) % variants.length;
        return variants[index];
      }

      function filterBodies(allBodies, query, type) {
        return allBodies
          .filter((body) => {
            const bodyName = (body.englishName || body.name || "").toLowerCase();
            const bodyType = (body.bodyType || "").toLowerCase();
            const byName = !query || bodyName.includes(query);
            const byType = !type || bodyType === type;
            return byName && byType;
          })
          .slice(0, MAX_RESULTS);
      }

      function mergeWithPriorityPlanets(liveBodies) {
        const unique = new Map();
        [...FALLBACK_BODIES, ...liveBodies].forEach((body) => {
          const key = String(body.englishName || body.name || "").toLowerCase().trim();
          if (!key) return;
          if (!unique.has(key)) unique.set(key, body);
        });
        return Array.from(unique.values());
      }

      function renderBodies(bodies) {
        if (!bodies.length) {
          resultsEl.innerHTML = `
            <div class="col-12">
              <article class="planet-card p-4">
                <p class="mb-0">No planetary bodies matched your filters.</p>
              </article>
            </div>
          `;
          return;
        }

        resultsEl.innerHTML = bodies
          .map((body, index) => {
            const englishName = body.englishName || body.name || "Unknown body";
            const bodyType = body.bodyType || "Unknown type";
            const gravity = typeof body.gravity === "number" ? `${formatNumber(body.gravity)} m/s²` : "Unknown";
            const meanRadius = typeof body.meanRadius === "number" ? `${formatNumber(body.meanRadius)} km` : "Unknown";
            const moons = Array.isArray(body.moons) ? body.moons.length : 0;
            const profile = getPlanetVisualProfile(englishName);
            const tiltY = -10 - (index % 5) * 4;
            const summaryText = `Explore ${englishName} in cinematic detail.`;
            const knownImage = resolveKnownPlanetImage(englishName);
            if (knownImage) body.imageUrl = knownImage;
            const initialTexture = cssBackgroundImageValue(body.imageUrl || knownImage || profile.cardGradient);

            return `
              <div class="col-12 col-md-6 col-lg-4">
                <article class="planet-card h-100" data-index="${index}">
                  <div class="planet-art" style="background:${profile.cardGradient};">
                    <div class="planet-sphere" style="--tilt-y:${tiltY}deg;">
                      <div class="planet-texture" data-texture-index="${index}" style="background-image:${initialTexture};"></div>
                      <div class="planet-bands"></div>
                      <div class="planet-terminator"></div>
                      <div class="planet-atmosphere" style="box-shadow: inset 0 0 20px ${profile.atmos}, 0 0 24px ${profile.atmos};"></div>
                    </div>
                  </div>
                  <div class="planet-card-body">
                    <h3 class="h5 planet-name mb-2">${englishName}</h3>
                    <p class="mb-2"><span class="badge tag">${bodyType}</span></p>
                    <p class="planet-desc">${summaryText}</p>
                    <div class="planet-metrics">
                      <article class="planet-metric"><span class="k">Gravity</span><span class="v">${gravity}</span></article>
                      <article class="planet-metric"><span class="k">Radius</span><span class="v">${meanRadius}</span></article>
                      <article class="planet-metric"><span class="k">Moons</span><span class="v">${moons}</span></article>
                    </div>
                  </div>
                </article>
              </div>
            `;
          })
          .join("");

        document.querySelectorAll(".planet-card").forEach((card) => {
          card.addEventListener("click", () => {
            const cardIndex = Number(card.dataset.index);
            const selectedBody = bodies[cardIndex];
            if (!selectedBody) return;

            const textureEl = card.querySelector(`[data-texture-index="${cardIndex}"]`);
            if (textureEl) {
              const bg = textureEl.style.backgroundImage || "";
              const matched = bg.match(/url\((['"]?)(.*?)\1\)/);
              if (matched && matched[2]) {
                selectedBody.selectedTextureUrl = matched[2];
              }
            }

            card.classList.remove("is-activating");
            void card.offsetWidth;
            card.classList.add("is-activating");

            window.setTimeout(() => {
              openDetails(selectedBody);
            }, 260);
          });
        });

        hydratePlanetImages(bodies);
      }

      async function requestBodiesFromApi() {
        let lastError = null;
        for (const url of API_URLS) {
          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), API_TIMEOUT_MS);
          try {
            const response = await fetch(url, {
              signal: controller.signal
            });
            if (!response.ok) {
              throw new Error(`API returned status ${response.status} for ${url}`);
            }

            const payload = await response.json();
            const allBodies = Array.isArray(payload)
              ? payload.map((planet) => normalizeExoplanet(planet))
              : [];
            if (allBodies.length) {
              return allBodies;
            }

            throw new Error(`No bodies payload from ${url}`);
          } catch (error) {
            lastError = error;
          } finally {
            window.clearTimeout(timeoutId);
          }
        }

        throw lastError || new Error("No planetary API endpoints available.");
      }

      async function fetchBodies() {
        const query = nameQueryInput.value.trim().toLowerCase();
        const type = bodyFilterInput.value.trim().toLowerCase();

        setStatus("Scanning planetary records...");
        setLoadingState(true);
        resultsEl.innerHTML = "";

        try {
          const liveBodies = await requestBodiesFromApi();
          const allBodies = mergeWithPriorityPlanets(liveBodies);
          const filteredBodies = filterBodies(allBodies, query, type);
          setStatus("Live API connected. Featured planets prioritized for cinematic view.");
          renderBodies(filteredBodies);
        } catch (error) {
          const fallbackFiltered = filterBodies(FALLBACK_BODIES, query, type);
          setStatus("Live API unavailable. Showing offline planetary dataset.");
          renderBodies(fallbackFiltered);
          console.error("Live API failed, using fallback:", error);
        } finally {
          setLoadingState(false);
        }
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        fetchBodies();
      });

      closeDetailsBtn.addEventListener("click", closeDetails);
      detailsOverlay.addEventListener("click", (event) => {
        if (event.target === detailsOverlay) closeDetails();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDetails();
      });

      fetchBodies();
    </script>
  </body>
</html>
